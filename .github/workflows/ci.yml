# Validation workflow for pirj/setup-snapcompose@v3 + pirj/snapcompose end-
# to-end. Runs on ubuntu-latest: the path adopters will actually use.
# First run on a given cache key = cold (aq's base-build runs); subsequent
# runs on the same key = warm (snapshot layer cache restored).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-snapcompose@v3
        with:
          aq-version: 'v2.5.42'                  # patch-from + serial-inject 10s timeout
          rlock-version: 'v0.1.12'               # chain-reconstruction leaf-direct fix
          cache-key-prefix: 'snapcompose-v4'     # invalidate prior cache after multi-layer fixture

      - name: snapc run — verify the warm DB
        run: |
          set -e
          # Final live layer of the multi-layer fixture is `schema-loaded`;
          # check both layer markers exist and the schema layer actually
          # inserted the seed rows.
          time snapc run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-prewarm /home/rlock/repo/.schema-loaded && docker compose exec -T db psql -U postgres -tAc "SELECT count(*) FROM bench_items;"'

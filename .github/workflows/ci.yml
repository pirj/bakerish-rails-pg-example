# Validation workflow for pirj/setup-bakerish@v2 + pirj/bakeri.sh end-
# to-end. Runs on ubuntu-latest: the path adopters will actually use.
# First run on a given cache key = cold (aq's base-build runs); subsequent
# runs on the same key = warm (snapshot layer cache restored).
#
# NOTE: aq's first-cold base-build currently hangs on the Alpine ISO
# GRUB autoselect under Linux/KVM (see aq/ROADMAP). The
# diagnose-kvm.yml sibling workflow exists to triage it. Until that's
# resolved, this workflow's cold runs will time out.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      - name: bake run — verify the warm DB
        run: |
          set -e
          # Times the full `bake run` call (cold on first run, warm on
          # subsequent). The cmd inside the VM uses the [prebuild.pg-
          # ready] sentinel file that the prebuild layer wrote during
          # snapshot_build.
          time bake run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-ready && cat /home/rlock/repo/.pg-ready'

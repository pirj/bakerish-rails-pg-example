# Validation workflow for pirj/setup-bakerish@v2 + pirj/bakeri.sh end-
# to-end. Runs on macos-14 (Apple Silicon, HVF) because aq's first-
# cold base-build hangs in the Alpine ISO GRUB autoselect under Linux/
# KVM — tracked in aq's ROADMAP as a portability bug. The macOS/HVF
# path is the one the maintainer develops against and the one this
# repo's pre-built aq-base release asset matches (aarch64 / Alpine
# 3.22.2 / size=16G).
#
# Cold flow: setup-bakerish installs aq+rlock+bakeri.sh; this workflow
# then stages the pre-built aq base from the `aq-base-3.22.2-aarch64-
# 16G` release asset so aq's `aq new --size=16G` finds the base raw
# already present and skips bootstrap_base_image. `bake run` proceeds
# to build the per-plugin snapshot layers and execute the command
# inside the VM.
#
# Warm flow: setup-bakerish cache restore re-populates ~/.local/share/
# aq/aarch64; the stage-base step sees the file present and no-ops.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      - name: Stage pre-built aq base on cold cache
        shell: bash
        run: |
          set -e
          BASE_RAW="$HOME/.local/share/aq/aarch64/alpine-base-3.22.2-aarch64-16G.raw"
          if [ -f "$BASE_RAW" ]; then
            echo "warm: aq base already present (cache hit) — skipping stage"
            exit 0
          fi
          echo "cold: fetching pre-built aq base from release asset"
          mkdir -p "$HOME/.local/share/aq"
          curl -sL \
            "https://github.com/${{ github.repository }}/releases/download/aq-base-3.22.2-aarch64-16G/aq-base-aarch64-16G.tar.zst" \
            | zstd -d | tar -xf - -C "$HOME/.local/share/aq"
          ls -la "$HOME/.local/share/aq/aarch64/"

      - name: bake run — verify the warm DB
        run: |
          set -e
          # Times the full `bake run` call (cold on first run, warm on
          # subsequent). The cmd inside the VM uses the [prebuild.pg-
          # ready] sentinel file that the prebuild layer wrote during
          # snapshot_build.
          time bake run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-ready && cat /home/rlock/repo/.pg-ready'

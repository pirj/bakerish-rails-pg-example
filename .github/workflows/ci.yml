# Validation workflow for pirj/setup-bakerish@v2 + pirj/bakeri.sh end-
# to-end. Runs on ubuntu-latest: the path adopters will actually use.
# First run on a given cache key = cold (aq's base-build runs); subsequent
# runs on the same key = warm (snapshot layer cache restored).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2
        with:
          aq-version: 'v2.5.28'                  # cross-host warm fix
          cache-key-prefix: 'bakeri-v2.5.23'     # invalidate prior cache after aq fix

      - name: bake run — verify the warm DB
        run: |
          set -e
          time bake run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-ready && cat /home/rlock/repo/.pg-ready'

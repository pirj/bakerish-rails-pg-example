# Diagnostic-only workflow: isolate aq's Linux/KVM base-build hang.
#
# The previous validation run (26216538089) timed out with the VM
# stuck in the Alpine ISO GRUB autoselect — the "1 s countdown" never
# fired. Two suspects:
#
#   A. tio/socat pipeline injects something GRUB reads as keyboard
#      input, resetting the countdown.
#   B. KVM/OVMF on the GH ubuntu-latest runner has a serial-or-input
#      misbehavior that holds GRUB.
#
# This workflow runs qemu directly — no tio, no socat, no aq — with
# `-serial mon:stdio` and a hard 90-second timeout. We capture the
# entire serial stream to an artifact. If GRUB autoselects and Alpine
# boots within 90s, the bug is in the tio interaction. If GRUB still
# loops, the bug is in KVM/OVMF (or much deeper).

name: diagnose-kvm

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose-kvm.yml'

permissions:
  contents: read

jobs:
  bare-qemu-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install qemu + ovmf + tools
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf cpu-checker wget
          # /dev/kvm world-rw (same trick setup-bakerish uses)
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Show host KVM state
        run: |
          set -e
          echo "=== kvm-ok ==="
          sudo kvm-ok || true
          echo
          echo "=== /dev/kvm ==="
          ls -la /dev/kvm
          echo
          echo "=== qemu version ==="
          qemu-system-x86_64 --version
          echo
          echo "=== ovmf paths ==="
          ls -la /usr/share/OVMF/ 2>/dev/null || true
          ls -la /usr/share/ovmf/ 2>/dev/null || true
          echo
          echo "=== KVM-related modules ==="
          lsmod | grep -i kvm || true

      - name: Download Alpine ISO + UEFI vars template
        run: |
          set -e
          mkdir -p $HOME/diag
          cd $HOME/diag
          wget -q https://dl-cdn.alpinelinux.org/alpine/v3.22/releases/x86_64/alpine-virt-3.22.2-x86_64.iso
          cp /usr/share/OVMF/OVMF_CODE_4M.fd OVMF_CODE.fd 2>/dev/null || \
            cp /usr/share/OVMF/OVMF_CODE.fd OVMF_CODE.fd
          cp /usr/share/OVMF/OVMF_VARS_4M.fd OVMF_VARS.fd 2>/dev/null || \
            cp /usr/share/OVMF/OVMF_VARS.fd OVMF_VARS.fd
          # blank 16G raw target disk (matches aq's base-build size)
          qemu-img create -f raw wip.raw 16G
          ls -la

      - name: Bare qemu boot — capture serial for 90 s
        run: |
          set -e
          cd $HOME/diag
          # Mirror aq's base-build qemu invocation but:
          #   - no -daemonize (foreground, so timeout can kill it)
          #   - -serial mon:stdio (so we read the serial stream directly,
          #     no socat/tio in the loop)
          #   - no -nic / -mon / -pidfile (irrelevant for this diagnostic)
          set +e
          timeout 90 qemu-system-x86_64 \
            -machine q35 -accel kvm -cpu host -m 1G \
            -drive file=OVMF_CODE.fd,format=raw,if=pflash,readonly=on,unit=0 \
            -drive file=OVMF_VARS.fd,format=raw,if=pflash,unit=1 \
            -drive if=virtio,file=wip.raw,format=raw,cache=none \
            -boot order=cd \
            -cdrom alpine-virt-3.22.2-x86_64.iso \
            -nographic \
            -serial mon:stdio \
            -rtc base=utc,clock=host \
            > serial.log 2>&1 < /dev/null &
          QPID=$!
          # Sleep just long enough for the timeout to expire, then dump.
          sleep 92
          kill -9 $QPID 2>/dev/null || true
          set -e
          echo "=== serial.log line count ==="
          wc -l serial.log
          echo
          echo "=== first 50 lines ==="
          head -50 serial.log || true
          echo
          echo "=== last 80 lines ==="
          tail -80 serial.log || true
          echo
          echo "=== grep for boot milestones ==="
          grep -E 'GRUB|automatically|Linux version|localhost login:|init\[1\]|Welcome to Alpine' serial.log || echo "(none of these markers found)"

      - name: Upload serial log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serial.log
          path: ~/diag/serial.log

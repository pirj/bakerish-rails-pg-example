# Diagnostic: warm-path SSH-not-reachable hang.
#
# After cold path was made green (3m20s total), a `gh workflow run ci`
# rerun hits warm cache (Layers ready in 2s) but then `aq start` of the
# final live-restored VM never responds to SSH for the full 3 min wait.
# qmp_wait_migrate_incoming / cont loop both succeed cleanly inside
# aq (no "incoming migration did not complete" or "VM did not
# transition to running" errors), so qemu reports running but the
# guest is unresponsive.
#
# This workflow runs `bake run` in the background, waits 30s, then
# dumps every observable state we can get at: qemu process status,
# QMP query-{status,migrate,name}, monitor `info {status,migrate,
# network,block,registers}`, serial console buffer drain, direct ssh
# probe, raw nc to the SSH host port. All as artifacts.
#
# Trigger manually via `gh workflow run diagnose-warm`. Expects the
# GH cache key `bakeri-Linux-e68...` to already exist from the green
# cold run; otherwise this re-runs cold and tells us nothing new.

name: diagnose-warm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      - name: Run bake in background + dump VM state mid-flight
        shell: bash
        run: |
          set -x
          VM_NAME=$(basename "$(pwd)")
          # rlock writes VMs under $AQ_STATE_DIR which defaults to
          # ~/.local/share/aq. aq sets BASE_DIR=~/.local/share/aq.
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"

          mkdir -p /tmp/diag
          # `bake run` in background so we can inspect while it hangs.
          (
            time bake run -- bash -c 'echo BAKE_RUN_INSIDE_OK; hostname; uname -a'
          ) > /tmp/diag/bake-stdout.log 2>&1 &
          BAKE_PID=$!
          echo "bake pid: $BAKE_PID"

          # Wait for VM dir + qemu process to materialise.
          for i in $(seq 1 90); do
            [ -f "$VM_DIR/process.pid" ] && break
            sleep 1
          done

          echo "=== vm dir state after qemu spawn ==="
          ls -la "$VM_DIR" || true

          # Give qemu ~30 sec to do the live restore + reach steady state.
          sleep 30

          echo "=== bake-stdout.log so far ==="
          cat /tmp/diag/bake-stdout.log || true

          echo "=== qemu process tree ==="
          QEMU_PID=$(cat "$VM_DIR/process.pid" 2>/dev/null || echo)
          echo "qemu pid file: $QEMU_PID"
          ps -ef | grep -E "qemu|socat|tio" | grep -v grep || true

          echo "=== ss / netstat on host (looking for SSH hostfwd port) ==="
          ss -tlnp 2>&1 | head -40 || true

          echo "=== ssh-port.conf ==="
          cat "$VM_DIR/ssh-port.conf" 2>/dev/null || echo "(absent)"
          echo "=== hostfwd.conf ==="
          cat "$VM_DIR/hostfwd.conf" 2>/dev/null || echo "(absent)"

          echo "=== qmp query-status / query-migrate / query-name ==="
          {
            printf '%s\n' \
              '{"execute":"qmp_capabilities"}' \
              '{"execute":"query-status"}' \
              '{"execute":"query-migrate"}' \
              '{"execute":"query-name"}'
            sleep 3
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/qmp.sock" 2>&1 || echo "(qmp connect failed)"

          echo "=== HMP info status / info migrate / info network ==="
          {
            printf '%s\n' 'info status' 'info migrate' 'info network' 'info chardev' 'quit'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1 || echo "(control connect failed)"

          echo "=== serial console drain (4 sec of read) ==="
          timeout 4 socat -u UNIX-CONNECT:"$VM_DIR/command.sock" STDOUT 2>&1 | tail -c 8192 | xxd | tail -100 || true

          echo "=== nc probe of SSH hostfwd port ==="
          SSH_PORT=$(cat "$VM_DIR/ssh-port.conf" 2>/dev/null | tr -d '[:space:]')
          if [ -n "$SSH_PORT" ]; then
            echo "trying nc -vz localhost $SSH_PORT"
            timeout 3 nc -vz localhost "$SSH_PORT" 2>&1 || echo "nc returned non-zero"
            echo "trying ssh -v ... root@localhost:$SSH_PORT (3s timeout)"
            timeout 5 ssh -v \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=3 \
              -o BatchMode=yes \
              -p "$SSH_PORT" \
              root@localhost "echo SSH_OK; uname -a; hostname; ps -ef | head" 2>&1 || echo "ssh returned non-zero"
          else
            echo "(no SSH_PORT — can't probe)"
          fi

          echo "=== one more nudge of serial — try writing newline ==="
          { echo ''; sleep 2; } | timeout 4 socat - UNIX-CONNECT:"$VM_DIR/command.sock" 2>&1 | tail -c 4096 | xxd | tail -50 || true

          echo "=== final bake-stdout.log (will likely still be stuck) ==="
          cat /tmp/diag/bake-stdout.log

          # Best-effort kill of the hanging bake run + qemu.
          kill $BAKE_PID 2>/dev/null || true
          [ -n "$QEMU_PID" ] && kill -9 "$QEMU_PID" 2>/dev/null || true
          sleep 2

      - name: Upload diag artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-warm-artifacts
          path: |
            /tmp/diag/
            /home/runner/.local/share/aq/bakerish-rails-pg-example/

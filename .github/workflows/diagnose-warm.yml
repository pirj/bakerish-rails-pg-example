# Diagnostic: warm-path hostfwd-not-applied. Phase 2.
#
# Phase 1 found: qemu lives, migration completes, VM status=running,
# but `info network` shows NO hostfwd on the user netdev — and `nc`
# to the SSH port gets Connection refused. The aq add_ssh_forward
# call returned 0 (no error) but the forward wasn't actually added.
#
# This phase: directly poke the HMP socket with hostfwd_add and read
# what qemu says back. Same fixture, warm cache.

name: diagnose-warm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      - name: Run bake in background + poke HMP hostfwd_add directly
        shell: bash
        run: |
          set -x
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"

          mkdir -p /tmp/diag
          (
            time bake run -- bash -c 'echo BAKE_RUN_INSIDE_OK; hostname'
          ) > /tmp/diag/bake-stdout.log 2>&1 &
          BAKE_PID=$!

          # Wait for qemu pidfile, then ~30s for live restore + steady state.
          for i in $(seq 1 90); do
            [ -f "$VM_DIR/process.pid" ] && break
            sleep 1
          done
          sleep 30

          echo "=== bake-stdout.log ==="
          cat /tmp/diag/bake-stdout.log

          echo "=== qemu cmdline ==="
          QEMU_PID=$(cat "$VM_DIR/process.pid")
          tr '\0' ' ' < /proc/$QEMU_PID/cmdline 2>/dev/null | fold -w 120
          echo

          echo "=== HMP info network (before our hostfwd_add poke) ==="
          {
            printf '%s\n' 'info network' 'info status'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== HMP hostfwd_add tcp::9999-:22 — try variant 1 (no netdev id) ==="
          {
            printf '%s\n' 'hostfwd_add tcp::9999-:22'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== HMP info network — did v1 take effect? ==="
          { printf '%s\n' 'info network'; sleep 2; } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== HMP hostfwd_add user.0 tcp::9998-:22 — try variant 2 (user.0 prefix) ==="
          {
            printf '%s\n' 'hostfwd_add user.0 tcp::9998-:22'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== HMP info network — did v2 take effect? ==="
          { printf '%s\n' 'info network'; sleep 2; } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== ss -tlnp for ports 9998-9999 ==="
          ss -tlnp 2>&1 | grep -E "9998|9999" || echo "(none listening)"

          echo "=== HMP help hostfwd ==="
          {
            printf '%s\n' 'help hostfwd_add' 'help hostfwd_remove'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1

          echo "=== QMP query-commands for hostfwd-relevant commands ==="
          {
            printf '%s\n' '{"execute":"qmp_capabilities"}' \
                          '{"execute":"query-commands"}'
            sleep 2
          } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/qmp.sock" 2>&1 | tr ',' '\n' | grep -iE "hostfwd|net" | head

          # Cleanup
          kill $BAKE_PID 2>/dev/null || true
          kill -9 $QEMU_PID 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-warm-artifacts
          path: /tmp/diag/

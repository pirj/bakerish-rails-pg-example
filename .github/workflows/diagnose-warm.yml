# Diagnostic phase 4: same-job warm-restore (no GH cache in between).
#
# Phase 1-3 found warm-path live-restore flaky: sometimes "VM did not
# transition to running", sometimes hostfwd works but guest sshd not
# reachable. Different outcomes with the same cached memory.bin.zst.
#
# Theory split:
# - If we live-restore IN THE SAME JOB (no actions/cache round-trip in
#   between), and it still flakes / fails — qemu's restore-from-file
#   is the bug.
# - If it works in same-job — GH cache action (tar pack/unpack, sparse
#   handling, permissions) is corrupting memory.bin.zst.
#
# This workflow does cold path, then manually stages the just-captured
# docker-compose memory.bin.zst as the VM's incoming-memory.bin.zst
# and forces a warm restart. Captures sha256 before/after, zstd -t
# integrity check, and ssh probe.

name: diagnose-warm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2
        with:
          # Force cold path: unique cache prefix per run (no hit possible,
          # nothing to pollute the validation cache with). restore-only
          # to skip the post-job save too.
          cache-key-prefix: 'diag-warm-${{ github.run_id }}'
          cache-restore-only: 'true'

      - name: Cold path bake run
        run: |
          set -ex
          time bake run -- bash -c 'echo COLD_OK; hostname; ps aux | grep -c sshd'

      - name: Locate docker-compose live snapshot in cache
        id: snap
        run: |
          set -ex
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"
          # rlock writes cache under $RL_CACHE_DIR; setup-bakerish caches
          # ~/.local/share/aq/cache/ (the *layer cache root*).
          RL_CACHE=$HOME/.local/share/aq/cache
          echo "=== rl cache tree ==="
          find "$RL_CACHE" -type d | head -30 || true
          find "$RL_CACHE" -name 'memory.bin*' -exec ls -la {} \; || true

          LIVE_MEM=$(find "$RL_CACHE" -name 'memory.bin.zst' | head -1)
          [ -n "$LIVE_MEM" ] || { echo "no live snapshot found"; exit 1; }
          echo "LIVE_MEM=$LIVE_MEM"
          echo "live_mem=$LIVE_MEM" >> "$GITHUB_OUTPUT"

          echo "=== zstd -t integrity check (cold-captured file) ==="
          zstd -t "$LIVE_MEM"

          echo "=== sha256 + size ==="
          sha256sum "$LIVE_MEM"
          stat -c '%s %n' "$LIVE_MEM"

      - name: Force warm restart from same memory.bin.zst (no GH cache hop)
        run: |
          set -ex
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"
          LIVE_MEM='${{ steps.snap.outputs.live_mem }}'

          echo "=== sha256 of source memory.bin.zst ==="
          SHA_SRC=$(sha256sum "$LIVE_MEM" | cut -d' ' -f1)
          echo "SHA_SRC=$SHA_SRC"

          echo "=== aq stop ==="
          aq stop "$VM_NAME" || true
          sleep 2

          # Stage memory.bin.zst as incoming for live-restore.
          cp "$LIVE_MEM" "$VM_DIR/incoming-memory.bin.zst"

          echo "=== sha256 of staged incoming ==="
          SHA_STAGED=$(sha256sum "$VM_DIR/incoming-memory.bin.zst" | cut -d' ' -f1)
          echo "SHA_STAGED=$SHA_STAGED"
          [ "$SHA_SRC" = "$SHA_STAGED" ] || { echo "STAGED FILE DIFFERS FROM SOURCE"; exit 1; }

          echo "=== zstd -t on staged ==="
          zstd -t "$VM_DIR/incoming-memory.bin.zst"

          echo "=== aq start ==="
          if aq start "$VM_NAME"; then
            echo "AQ_START_OK"
            SSH_PORT=$(cat "$VM_DIR/ssh-port.conf" | tr -d ' \n')
            echo "=== ssh probe ==="
            timeout 10 ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 -o BatchMode=yes \
              -p "$SSH_PORT" root@localhost "echo SSH_OK_WARM_SAMEJOB; uname -a; hostname; ps aux | grep -E 'sshd|postgres|dockerd' | head" 2>&1 || echo "ssh exit non-zero"
          else
            echo "AQ_START_FAILED_SAMEJOB"
            exit 1
          fi

# Diagnostic: warm-path live-restore phase 3.
#
# Phase 1: qemu is running, hostfwd is added (ss shows :PORT LISTEN
#   by qemu-system-x86_64), but nc/ssh from host get Connection
#   refused. That's qemu RST'ing on behalf of guest = guest's :22
#   isn't reachable.
# Phase 2: confirmed hostfwd_add works syntactically.
# Phase 3 (this): poke the guest via serial console. Is the guest
#   alive at all? Is sshd running? Is eth0 configured?

name: diagnose-warm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      - name: Background bake + serial-console probe of live-restored guest
        shell: bash
        run: |
          set -x
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"

          mkdir -p /tmp/diag
          ( time bake run -- bash -c 'echo INSIDE_OK; hostname' ) > /tmp/diag/bake.log 2>&1 &
          BAKE_PID=$!

          for i in $(seq 1 90); do
            [ -f "$VM_DIR/process.pid" ] && break
            sleep 1
          done
          sleep 30  # let live-restore complete

          QEMU_PID=$(cat "$VM_DIR/process.pid")
          echo "=== bake.log so far ==="
          cat /tmp/diag/bake.log

          echo "=== host: ss for SSH port ==="
          SSH_PORT=$(cat "$VM_DIR/ssh-port.conf" | tr -d ' \n')
          ss -tlnp 2>&1 | grep -E ":$SSH_PORT|qemu-system" | head

          echo "=== host: nc :$SSH_PORT ==="
          timeout 3 nc -vz 127.0.0.1 "$SSH_PORT" 2>&1 || true

          echo "=== SERIAL drain — passive (5s) ==="
          timeout 5 socat -u UNIX-CONNECT:"$VM_DIR/command.sock" STDOUT 2>&1 | tail -c 4096 | xxd | tail -40 || true

          echo "=== SERIAL nudge — send Enter, wait 2s ==="
          {
            printf '\n'
            sleep 2
          } | timeout 4 socat - UNIX-CONNECT:"$VM_DIR/command.sock" 2>&1 | tail -c 4096 | xxd | tail -40 || true

          echo "=== SERIAL nudge — login as root, run diag inside ==="
          {
            printf '\n'
            sleep 1
            printf 'root\n'
            sleep 2
            printf 'echo MARKER_GUEST_OK; date; hostname; ip -4 a show eth0; ss -tlnp; ps aux | grep -E "sshd|docker" | head\n'
            sleep 4
            printf 'echo MARKER_GUEST_END\n'
            sleep 2
          } | timeout 15 socat - UNIX-CONNECT:"$VM_DIR/command.sock" 2>&1 | tail -c 8192

          echo "=== ssh -v probe (after guest poke) ==="
          timeout 6 ssh -v \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=4 -o BatchMode=yes \
            -p "$SSH_PORT" root@localhost "echo SSH_OK_AT_$(date +%s); uname -a" 2>&1 | tail -30 || true

          # Cleanup. NO `quit` in HMP — that just kills the qemu we still
          # need to finish the background bake.
          kill $BAKE_PID 2>/dev/null || true
          kill -9 $QEMU_PID 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-warm-artifacts
          path: /tmp/diag/

# Critical test: does save -> destroy qemu -> restore via -incoming file:
# work on THE SAME Azure VM? Cross-job tests have all failed; we have no
# data on whether the save/restore *mechanism* works at all, or whether
# it specifically requires the original qemu process to stay alive.

name: same-host-warm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  same-host:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AQ_NO_SNAPSHOT_COMPRESS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Host fingerprint
        run: |
          awk '/^processor/{n++} n==1' /proc/cpuinfo | grep -E "model name|stepping|microcode"
          uname -a

      - uses: pirj/setup-bakerish@v2
        with:
          cache-key-prefix: same-host-${{ github.run_id }}
          no-snapshot-compress: 'true'

      - name: Phase 1 — cold bake run (creates VM, runs prep, populates cache)
        run: time bake run -- bash -c 'echo PHASE1_COLD_OK'

      - name: Phase 2 — destroy qemu, restore from cache on SAME host
        id: warm
        continue-on-error: true
        run: |
          set -ex
          VM_NAME=$(basename "$(pwd)")

          echo "=== VM state before destroy ==="
          aq ls 2>&1 || true
          ls -la "$HOME/.local/share/aq/$VM_NAME" 2>&1 || true

          echo "=== Destroy VM (kill qemu, remove vm dir) ==="
          aq rm "$VM_NAME" 2>&1 || aq stop "$VM_NAME" 2>&1 || true
          rm -rf "$HOME/.local/share/aq/$VM_NAME"
          sleep 1

          echo "=== Verify destroyed ==="
          aq ls 2>&1 || true
          pgrep -fa qemu-system 2>&1 || echo "no qemu process"

          echo "=== Phase 2 — bake run (forces fresh VM + -incoming file: from cache) ==="
          time bake run -- bash -c 'echo PHASE2_WARM_OK; hostname; ps -eo pid,etime,comm | grep -E "postgres|dockerd|init" | head'

      - name: Dump on failure
        if: always() && steps.warm.outcome == 'failure'
        run: |
          set -x
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"
          ls -la "$VM_DIR" 2>&1 || true
          [ -S "$VM_DIR/qmp.sock" ] && (
            { printf '%s\n' '{"execute":"qmp_capabilities"}' '{"execute":"query-migrate"}' '{"execute":"query-status"}'; sleep 1; } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/qmp.sock" 2>&1
          ) || echo "qmp.sock missing"

      - name: Fail if warm failed
        if: steps.warm.outcome == 'failure'
        run: exit 1

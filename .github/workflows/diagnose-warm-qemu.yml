# Targeted diagnostic for the cross-job warm silent-cold-boot.
# Saves the cached-warm cache from a fresh cold run, then in a
# second job restores it AND points aq at a captured qemu log
# file via AQ_QEMU_LOG_FILE. After bake-run fails, dump the log
# and the full qmp query-migrate response.

name: diagnose-warm-qemu

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CACHE_KEY: warm-q-${{ github.run_id }}

jobs:
  save:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AQ_NO_SNAPSHOT_COMPRESS: '1'   # save memory.bin raw (no zstd) to eliminate exec:zstd -dc from the restore path
    steps:
      - uses: actions/checkout@v4
      - name: Host fingerprint (save)
        run: |
          echo "=== /proc/cpuinfo (first core only) ==="
          awk '/^processor/{n++} n==1' /proc/cpuinfo
          echo "=== kernel ==="
          uname -a
          echo "=== KVM module ==="
          modinfo kvm 2>&1 | head -10 || true
          modinfo kvm_amd 2>&1 | head -10 || true
          modinfo kvm_intel 2>&1 | head -10 || true
          echo "=== qemu version ==="
          dpkg -l | grep -i qemu | head -5
      - uses: pirj/setup-bakerish@v2
        with:
          cache-key-prefix: ${{ env.CACHE_KEY }}
          no-snapshot-compress: 'true'
      - run: time bake run -- bash -c 'echo SAVE_COLD_OK'

  restore:
    needs: save
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AQ_QEMU_LOG_FILE: /tmp/qemu.log
      AQ_NO_SNAPSHOT_COMPRESS: '1'
      # Trace events write to the file set by -D, captured via AQ_QEMU_LOG_FILE.
      # Broad patterns to catch any migration-related event qemu emits at incoming
      # load time. If file is empty, qemu's trace backend isn't compiled in (rare)
      # OR the migration code path is not invoked at all.
      # Removed kvm_failed_* trace — it appeared to invalidate the whole trace
      # config last run (qemu.log was empty). Keep the working set only.
      # -no-reboot: qemu exits on guest reset instead of silently rebooting.
      # If cross-VM restore triggers a guest triple-fault/panic, qemu will
      # be GONE after migration completes — easy to detect via qmp.sock.
      # -d cpu_reset,unimp,guest_errors: log CPU reset events, unimplemented
      # instructions, and guest errors to /tmp/qemu.log.
      AQ_QEMU_EXTRA_ARGS: "--trace migration* --trace loadvm* --trace vmstate* -no-reboot -d cpu_reset,unimp,guest_errors"
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-bakerish@v2
        with:
          cache-key-prefix: ${{ env.CACHE_KEY }}
          cache-restore-only: 'true'
          no-snapshot-compress: 'true'

      - name: Host fingerprint + bpftrace on kvm_set_msr
        run: |
          echo "=== /proc/cpuinfo (first core only) ==="
          awk '/^processor/{n++} n==1' /proc/cpuinfo
          echo "=== kernel ==="
          uname -a

          set -x
          # Capture qemu stderr
          sed -i 's|${AQ_QEMU_EXTRA_ARGS:-}|${AQ_QEMU_EXTRA_ARGS:-} 2>>/tmp/qemu-stderr.log|' /home/runner/aq/aq
          grep -nE "AQ_QEMU_EXTRA_ARGS|\\-cpu " /home/runner/aq/aq | head

          # bpftrace on __kvm_set_msr / kvm_set_msr_common — these are the
          # kernel functions invoked by KVM_SET_MSRS ioctl. Logs the MSR
          # index and value for each attempted write, including return code.
          # `__kvm_set_msr` is the inner function that does the actual work.
          sudo apt-get install -y bpftrace 2>&1 | tail -3
          # List kprobes that match kvm_set_msr*
          sudo bpftrace -lv 'kprobe:kvm_set_msr*' 2>&1 | head -10 || true
          # Save MSR index at function entry, then check retval on return.
          # kvm_set_msr signature: int kvm_set_msr(vcpu, u32 index, u64 data).
          # arg0=vcpu, arg1=msr_index, arg2=msr_data. retval=0 ok else err.
          sudo bpftrace -e '
            kprobe:kvm_set_msr {
              @msr_idx[tid] = arg1;
              @msr_data[tid] = arg2;
            }
            kretprobe:kvm_set_msr {
              if (retval != 0) {
                printf("FAIL kvm_set_msr msr=0x%lx data=0x%lx ret=%d\n",
                       @msr_idx[tid], @msr_data[tid], (int64)retval);
              }
              delete(@msr_idx[tid]);
              delete(@msr_data[tid]);
            }
            kprobe:kvm_set_msr_common {
              @c_idx[tid] = arg1;
            }
            kretprobe:kvm_set_msr_common {
              if (retval != 0) {
                printf("FAIL kvm_set_msr_common msr=0x%lx ret=%d\n",
                       @c_idx[tid], (int64)retval);
              }
              delete(@c_idx[tid]);
            }
          ' > /tmp/bpftrace.log 2>&1 &
          echo $! > /tmp/bpftrace.pid
          sleep 2
          echo "bpftrace started, pid=$(cat /tmp/bpftrace.pid)"
          ps -p "$(cat /tmp/bpftrace.pid)" 2>&1 || echo "bpftrace died"

      - name: Cross-job warm bake run
        id: warm
        continue-on-error: true
        run: |
          set -ex
          export AQ_QEMU_LOG_FILE
          time bake run -- bash -c 'echo WARM_OK; hostname; ps aux | grep -E "postgres|dockerd" | wc -l'

      - name: Dump qemu.log + qmp query-migrate
        if: always()
        run: |
          # bash -e (errexit) by default — aborts on first non-zero exit. But
          # socat to a dead qmp.sock returns 1, which would skip the rest of
          # the diagnostic steps (incl. the nbd mount). Disable errexit.
          set +e
          set -x
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"

          echo "=== rlock cache contents ==="
          find "$HOME/.local/share/aq/cache" -type f 2>&1 | head -40 || true
          echo "=== cache memory.bin* files ==="
          find "$HOME/.local/share/aq/cache" -name 'memory.bin*' -exec ls -la {} \; 2>&1 || true
          echo "=== cache meta.json kinds ==="
          find "$HOME/.local/share/aq/cache" -name meta.json -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \; 2>&1 || true

          echo "=== /tmp/qemu.log ==="
          if [ -f /tmp/qemu.log ]; then
            cat /tmp/qemu.log
          else
            echo "(no qemu.log captured — AQ_QEMU_LOG_FILE didn't take effect?)"
          fi

          echo "=== qmp query-migrate (full json) ==="
          if [ -S "$VM_DIR/qmp.sock" ]; then
            {
              printf '%s\n' '{"execute":"qmp_capabilities"}'
              printf '%s\n' '{"execute":"query-migrate"}'
              printf '%s\n' '{"execute":"query-migrate-capabilities"}'
              printf '%s\n' '{"execute":"query-migrate-parameters"}'
              printf '%s\n' '{"execute":"query-status"}'
              sleep 2
            } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/qmp.sock" 2>&1
          else
            echo "(qmp.sock missing — qemu gone)"
          fi

          echo "=== HMP info migrate verbose ==="
          if [ -S "$VM_DIR/control.sock" ]; then
            {
              printf 'info migrate\n'
              printf 'info migrate_capabilities\n'
              printf 'info migrate_parameters\n'
              printf 'info status\n'
              sleep 2
            } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/control.sock" 2>&1
          fi

          echo "=== VM dir contents ==="
          ls -la "$VM_DIR" 2>&1 || true
          echo "=== Incoming memory file existence ==="
          ls -la "$VM_DIR/incoming-memory.bin.zst" "$VM_DIR/incoming-memory.bin" 2>&1 || true

          echo "=== /tmp/qemu-stderr.log (qemu's pre-daemonize stderr) ==="
          if [ -f /tmp/qemu-stderr.log ]; then
            wc -c /tmp/qemu-stderr.log
            cat /tmp/qemu-stderr.log
          else
            echo "(qemu-stderr.log missing — sed patch didn't take?)"
          fi

          echo "=== bpftrace output (failed MSR writes from qemu via KVM_SET_MSRS) ==="
          if [ -f /tmp/bpftrace.pid ]; then
            sudo kill "$(cat /tmp/bpftrace.pid)" 2>&1 || true
            sleep 1
          fi
          if [ -f /tmp/bpftrace.log ]; then
            wc -l /tmp/bpftrace.log
            cat /tmp/bpftrace.log
          else
            echo "(bpftrace.log missing)"
          fi

          echo "=== qemu process state ==="
          ps -fp "$(cat $VM_DIR/process.pid 2>/dev/null)" 2>&1 || true
          ls -la "$VM_DIR/qmp.sock" "$VM_DIR/control.sock" "$VM_DIR/command.sock" 2>&1 || true

          echo "=== dmesg (OOM killer? KVM ioctl errors?) ==="
          sudo dmesg | tail -100 2>&1 || true

          echo "=== syslog (qemu segfault? abort?) ==="
          sudo tail -200 /var/log/syslog 2>&1 | grep -iE "qemu|segfault|abort|killed|oom|kvm" || sudo tail -200 /var/log/syslog 2>&1 | tail -50 || true

          echo "=== journalctl qemu/abrt ==="
          sudo journalctl -n 100 --no-pager 2>&1 | grep -iE "qemu|kvm|abrt|core" | tail -30 || true

          echo "=== core pattern ==="
          cat /proc/sys/kernel/core_pattern 2>&1 || true
          ls -la /tmp/core* 2>&1 || true

          echo "=== qmp query-cpus-fast (are CPUs running?) ==="
          if [ -S "$VM_DIR/qmp.sock" ]; then
            {
              printf '%s\n' '{"execute":"qmp_capabilities"}'
              printf '%s\n' '{"execute":"query-cpus-fast"}'
              printf '%s\n' '{"execute":"human-monitor-command","arguments":{"command-line":"info registers"}}'
              printf '%s\n' '{"execute":"human-monitor-command","arguments":{"command-line":"info roms"}}'
              printf '%s\n' '{"execute":"human-monitor-command","arguments":{"command-line":"info block"}}'
              sleep 2
            } | timeout 5 socat - UNIX-CONNECT:"$VM_DIR/qmp.sock" 2>&1
          fi

          echo "=== serial: execute diagnostics inside guest ==="
          # The guest's serial console has an open root shell (alpine:~#).
          # Send commands and capture output. Newlines + delays to let
          # the shell read them. \r is the line terminator for raw tty.
          if [ -S "$VM_DIR/command.sock" ]; then
            (
              sleep 0.5
              printf '\r'
              sleep 0.3
              printf 'echo GUEST_DIAG_BEGIN\r'
              sleep 0.3
              printf 'echo --- sshd_config Banner/Match/AllowUsers/MaxStartups ---\r'
              sleep 0.3
              printf 'grep -iE "banner|match|allow|maxstartup|hostsallow|deny" /etc/ssh/sshd_config 2>&1\r'
              sleep 0.5
              printf 'echo --- /etc/issue /etc/issue.net /etc/motd ---\r'
              sleep 0.3
              printf 'for f in /etc/issue /etc/issue.net /etc/motd /etc/hosts.deny /etc/hosts.allow; do echo ">>> $f"; cat "$f" 2>&1; done\r'
              sleep 1
              printf 'echo --- which sshd + version ---\r'
              sleep 0.3
              printf 'which sshd; sshd -t -V 2>&1; sshd -? 2>&1 | head -5\r'
              sleep 0.5
              printf 'echo --- netstat sshd LISTEN ---\r'
              sleep 0.3
              printf 'netstat -tlnp 2>&1 | grep :22; ss -tlnp 2>&1 | grep :22\r'
              sleep 0.5
              printf 'echo --- last 10 sshd-session log lines ---\r'
              sleep 0.3
              printf 'tail -10 /var/log/messages 2>&1\r'
              sleep 0.5
              printf 'echo --- self-probe ssh to localhost ---\r'
              sleep 0.3
              printf 'echo "" | timeout 3 nc -v 127.0.0.1 22 2>&1\r'
              sleep 1
              printf 'cat /etc/pam.d/sshd 2>&1\r'
              sleep 0.5
              printf 'uptime\r'
              sleep 0.3
              printf 'date\r'
              sleep 0.3
              printf 'cat /proc/uptime\r'
              sleep 0.3
              printf 'rc-status default\r'
              sleep 0.5
              printf 'ps -eo pid,etime,comm | head -20\r'
              sleep 0.5
              printf 'journalctl -u sshd --no-pager -n 20 2>&1 || ( echo -- /var/log/messages tail --; tail -30 /var/log/messages 2>&1; echo -- /var/log/auth.log tail --; tail -20 /var/log/auth.log 2>&1 )\r'
              sleep 1
              printf 'echo GUEST_DIAG_END\r'
              sleep 1
            ) | timeout 15 socat - UNIX-CONNECT:"$VM_DIR/command.sock" 2>&1 | head -200
          fi

          echo "=== qemu-nbd mount of storage.qcow2 (look at guest filesystem) ==="
          # Need qemu to release the disk first
          if [ -f "$VM_DIR/process.pid" ]; then
            sudo kill "$(cat $VM_DIR/process.pid)" 2>&1 || true
            sleep 2
          fi
          sudo modprobe nbd max_part=8 2>&1 || true
          sudo qemu-nbd --read-only --connect=/dev/nbd0 "$VM_DIR/storage.qcow2" 2>&1 || true
          sleep 1
          sudo lsblk /dev/nbd0 2>&1 || true
          # Try common partitions — Alpine usually has /dev/vda3 (root) which becomes nbd0p3
          for p in /dev/nbd0p3 /dev/nbd0p1 /dev/nbd0p2; do
            if sudo file -s "$p" 2>&1 | grep -q ext; then
              echo "--- mounting $p ---"
              sudo mkdir -p /mnt/guest
              sudo mount -o ro "$p" /mnt/guest 2>&1 || continue
              echo "=== /etc/nologin: ==="
              sudo ls -la /mnt/guest/etc/nologin 2>&1 || echo "(absent)"
              sudo head -10 /mnt/guest/etc/nologin 2>&1 || true
              echo "=== /etc/pam.d/sshd: ==="
              sudo cat /mnt/guest/etc/pam.d/sshd 2>&1 || true
              echo "=== /etc/banner / /etc/issue / /etc/issue.net / /etc/motd: ==="
              for f in banner issue issue.net motd; do
                echo "--- /etc/$f ---"
                sudo cat /mnt/guest/etc/$f 2>&1 || echo "(absent)"
              done
              echo "=== /etc/security/time.conf (pam_time rules): ==="
              sudo cat /mnt/guest/etc/security/time.conf 2>&1 | grep -v "^#" | head -20 || echo "(absent or all comments)"
              echo "=== /etc/init.d/nologin script: ==="
              sudo head -30 /mnt/guest/etc/init.d/nologin 2>&1 || echo "(absent)"
              echo "=== /var/log/messages tail: ==="
              sudo tail -50 /mnt/guest/var/log/messages 2>&1 || echo "(absent)"
              sudo umount /mnt/guest
              break
            fi
          done
          sudo qemu-nbd --disconnect /dev/nbd0 2>&1 || true

      - name: Fail if warm failed
        if: steps.warm.outcome == 'failure'
        run: exit 1

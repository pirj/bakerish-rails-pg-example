# Benchmark rounds 17 + 18 — cross-VM warm restore with the 3-live-layer
# fixture (compose + pg-prewarm + schema-loaded). Mirrors meta/
# benchmark-progression.md's M3 measurements, but on ubuntu-latest
# (Azure KVM nested in Hyper-V).
#
# Two independent pipelines so a cold failure in one mode doesn't block
# the other's warm matrix:
#   R17 path: cold-zstd → warm-zstd (matrix 1..5)
#   R18 path: cold-zstd-patch → warm-zstd-patch (matrix 1..5)

name: benchmark-r17-r18

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Cache key suffix (bump to force fresh cache)'
        required: false
        default: 'r17r18-v2'

env:
  AQ_VERSION: 'v2.5.37'
  RLOCK_VERSION: 'v0.1.9'

jobs:
  cold-zstd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-snapcompose@v3
        with:
          aq-version: ${{ env.AQ_VERSION }}
          rlock-version: ${{ env.RLOCK_VERSION }}
          cache-key-prefix: 'bench-${{ inputs.tag }}-zstd'
      - name: cold snapc run (zstd)
        env:
          AQ_TIMING: '1'
          AQ_MEMORY_SNAPSHOT: 'zstd'
        run: |
          set -e
          t0=$EPOCHREALTIME
          time snapc run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-prewarm /home/rlock/repo/.schema-loaded'
          t1=$EPOCHREALTIME
          ms=$(awk "BEGIN { printf \"%.0f\", ($t1 - $t0) * 1000 }")
          echo "COLD_ZSTD_MS=$ms"
          du -sh ~/.local/share/aq/cache 2>/dev/null || true
          find ~/.local/share/aq/cache -type f \( -name 'memory.bin*' -o -name 'disk.qcow2' \) -exec ls -la {} \; 2>/dev/null || true

  cold-zstd-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-snapcompose@v3
        with:
          aq-version: ${{ env.AQ_VERSION }}
          rlock-version: ${{ env.RLOCK_VERSION }}
          cache-key-prefix: 'bench-${{ inputs.tag }}-zstd-patch'
      - name: cold snapc run (zstd-patch)
        env:
          AQ_TIMING: '1'
          AQ_MEMORY_SNAPSHOT: 'zstd-patch'
        run: |
          set -e
          t0=$EPOCHREALTIME
          time snapc run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-prewarm /home/rlock/repo/.schema-loaded'
          t1=$EPOCHREALTIME
          ms=$(awk "BEGIN { printf \"%.0f\", ($t1 - $t0) * 1000 }")
          echo "COLD_ZSTD_PATCH_MS=$ms"
          du -sh ~/.local/share/aq/cache 2>/dev/null || true
          find ~/.local/share/aq/cache -type f \( -name 'memory.bin*' -o -name 'disk.qcow2' \) -exec ls -la {} \; 2>/dev/null || true

  warm-zstd:
    needs: cold-zstd
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-snapcompose@v3
        with:
          aq-version: ${{ env.AQ_VERSION }}
          rlock-version: ${{ env.RLOCK_VERSION }}
          cache-key-prefix: 'bench-${{ inputs.tag }}-zstd'
          cache-restore-only: 'true'
      - name: warm snapc run (zstd, sample ${{ matrix.sample }})
        env:
          AQ_TIMING: '1'
          AQ_MEMORY_SNAPSHOT: 'zstd'
        run: |
          set -e
          t0=$EPOCHREALTIME
          time snapc run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-prewarm /home/rlock/repo/.schema-loaded'
          t1=$EPOCHREALTIME
          ms=$(awk "BEGIN { printf \"%.0f\", ($t1 - $t0) * 1000 }")
          echo "WARM_ZSTD_${{ matrix.sample }}_MS=$ms"

  warm-zstd-patch:
    needs: cold-zstd-patch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-snapcompose@v3
        with:
          aq-version: ${{ env.AQ_VERSION }}
          rlock-version: ${{ env.RLOCK_VERSION }}
          cache-key-prefix: 'bench-${{ inputs.tag }}-zstd-patch'
          cache-restore-only: 'true'
      - name: warm snapc run (zstd-patch, sample ${{ matrix.sample }})
        env:
          AQ_TIMING: '1'
          AQ_MEMORY_SNAPSHOT: 'zstd-patch'
        run: |
          set -e
          t0=$EPOCHREALTIME
          time snapc run -- bash -c 'set -e; ls -l /home/rlock/repo/.pg-prewarm /home/rlock/repo/.schema-loaded'
          t1=$EPOCHREALTIME
          ms=$(awk "BEGIN { printf \"%.0f\", ($t1 - $t0) * 1000 }")
          echo "WARM_ZSTD_PATCH_${{ matrix.sample }}_MS=$ms"

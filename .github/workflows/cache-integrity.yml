# Cache-integrity test: confirm actions/cache@v4 corrupts memory.bin.zst.
#
# Same-job warm restart (diagnose-warm.yml phase 4) proved qemu's
# `-incoming file:` is reliable: cold path → manually re-stage the
# captured memory.bin.zst → aq stop → aq start → SSH probe SUCCEEDS,
# with the original snapshot's process tree intact (postgres, dockerd,
# sshd at their original PIDs).
#
# Cross-job warm via actions/cache@v4 fails with at least three
# distinct failure modes across runs — that's bytes-corrupted-in-
# different-places, not a single mode. So the corruption is real.
#
# This workflow proves it byte-perfectly:
#  - Job "save": run cold path with a unique cache key, compute
#    sha256 + size of memory.bin.zst, write to an artifact, let the
#    post-job step save it to actions/cache.
#  - Job "restore" (depends on save): restore that key, compute
#    sha256 + size, compare to the artifact. Exit failure on diff.

name: cache-integrity

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CACHE_KEY: cache-int-${{ github.run_id }}

jobs:
  save:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha256:        ${{ steps.fingerprint.outputs.sha256 }}
      size:          ${{ steps.fingerprint.outputs.size }}
      cpu_model:     ${{ steps.fingerprint.outputs.cpu_model }}
      cpu_flags_sha: ${{ steps.fingerprint.outputs.cpu_flags_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-bakerish@v2
        with:
          cache-key-prefix: ${{ env.CACHE_KEY }}
      - name: Cold path
        run: time bake run -- bash -c 'echo COLD_OK'

      - name: Fingerprint memory.bin.zst (save side) + CPU info
        id: fingerprint
        run: |
          set -ex
          LIVE_MEM=$(find "$HOME/.local/share/aq/cache" -name 'memory.bin.zst' | head -1)
          [ -n "$LIVE_MEM" ] || { echo 'no memory.bin.zst in cache'; exit 1; }
          SHA=$(sha256sum "$LIVE_MEM" | cut -d' ' -f1)
          SIZE=$(stat -c '%s' "$LIVE_MEM")
          CPU_MODEL=$(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')
          CPU_FLAGS_SHA=$(grep -m1 '^flags' /proc/cpuinfo | sha256sum | cut -d' ' -f1)
          echo "SAVE_SHA=$SHA"
          echo "SAVE_SIZE=$SIZE"
          echo "SAVE_CPU_MODEL=$CPU_MODEL"
          echo "SAVE_CPU_FLAGS_SHA=$CPU_FLAGS_SHA"
          echo "sha256=$SHA"                 >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"                  >> "$GITHUB_OUTPUT"
          echo "cpu_model=$CPU_MODEL"        >> "$GITHUB_OUTPUT"
          echo "cpu_flags_sha=$CPU_FLAGS_SHA" >> "$GITHUB_OUTPUT"
          zstd -t "$LIVE_MEM"

  restore:
    needs: save
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pirj/setup-bakerish@v2
        with:
          cache-key-prefix: ${{ env.CACHE_KEY }}
          cache-restore-only: 'true'

      - name: Fingerprint memory.bin.zst (restore side) + CPU diff + bake run
        run: |
          set -ex
          LIVE_MEM=$(find "$HOME/.local/share/aq/cache" -name 'memory.bin.zst' | head -1)
          [ -n "$LIVE_MEM" ] || { echo 'cache restore did not deliver memory.bin.zst'; exit 1; }
          SHA=$(sha256sum "$LIVE_MEM" | cut -d' ' -f1)
          SIZE=$(stat -c '%s' "$LIVE_MEM")
          CPU_MODEL=$(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')
          CPU_FLAGS_SHA=$(grep -m1 '^flags' /proc/cpuinfo | sha256sum | cut -d' ' -f1)
          echo "RESTORE_SHA=$SHA"
          echo "RESTORE_SIZE=$SIZE"
          echo "RESTORE_CPU_MODEL=$CPU_MODEL"
          echo "RESTORE_CPU_FLAGS_SHA=$CPU_FLAGS_SHA"
          echo "SAVE_SHA=${{ needs.save.outputs.sha256 }}"
          echo "SAVE_SIZE=${{ needs.save.outputs.size }}"
          echo "SAVE_CPU_MODEL=${{ needs.save.outputs.cpu_model }}"
          echo "SAVE_CPU_FLAGS_SHA=${{ needs.save.outputs.cpu_flags_sha }}"
          if [ "$SHA" != "${{ needs.save.outputs.sha256 }}" ]; then
            echo "FILE CORRUPTION: sha256 differs"; exit 1
          fi
          if [ "$CPU_MODEL" != "${{ needs.save.outputs.cpu_model }}" ]; then
            echo "CPU MODEL DIFFERS between save and restore runners"
          fi
          if [ "$CPU_FLAGS_SHA" != "${{ needs.save.outputs.cpu_flags_sha }}" ]; then
            echo "CPU FLAGS DIFFER between save and restore runners"
          fi

      - name: Actual cross-job warm bake run
        id: warm
        continue-on-error: true
        run: |
          set -ex
          time bake run -- bash -c 'echo WARM_OK; hostname; ps aux | grep -E "postgres|dockerd" | wc -l'

      - name: Post-warm guest probe via serial console
        if: steps.warm.outcome == 'failure'
        run: |
          set -x
          VM_NAME=$(basename "$(pwd)")
          VM_DIR="$HOME/.local/share/aq/$VM_NAME"
          [ -S "$VM_DIR/command.sock" ] || { echo "no command.sock — guest qemu is gone"; exit 0; }
          # Live-restored VM is alive but sshd refuses logins.
          # Use serial console (root auto-logged-in or login as root) to inspect.
          {
            printf '\n'
            sleep 1
            printf 'root\n'
            sleep 2
            printf 'echo MARK_DATE; date; echo MARK_UPTIME; cat /proc/uptime; echo MARK_NOLOGIN_TEST; ls -la /etc/nologin 2>&1; cat /etc/nologin 2>&1; echo MARK_CLOCKSOURCE; cat /sys/devices/system/clocksource/clocksource0/{available,current}_clocksource 2>&1; echo MARK_PAM_SSHD; cat /etc/pam.d/sshd 2>&1; echo MARK_SECURITY_DIR; ls /etc/security/ 2>&1; echo MARK_SSHD_PROC; ps aux | grep sshd; echo MARK_DMESG_TAIL; dmesg | tail -30; echo MARK_DONE\n'
            sleep 6
          } | timeout 20 socat - UNIX-CONNECT:"$VM_DIR/command.sock" 2>&1 || true

      - name: Fail if warm failed
        if: steps.warm.outcome == 'failure'
        run: exit 1

# Validation + benchmark fixture: tiny Rails+Postgres-shaped project that
# exercises bakeri.sh CI integration end-to-end on GH Actions.
#
# As of 2026-05-27 this fixture also benchmarks the
# AQ_MEMORY_SNAPSHOT=zstd-patch path — three live layers in a row
# (docker-compose + pg-prewarm + schema-loaded) so the patch encoding
# of pg-prewarm and schema-loaded against compose can be measured. See
# meta/benchmark-progression.md rounds 17 (default zstd) and 18 (patch).
#
# Note on single-line `cmd`: bakeri.sh's TOML reader (rlock's
# lib/toml.sh) supports only single-line `key = "value"` form. TOML's
# triple-quoted multi-line strings aren't supported. Multi-step shells
# are chained with && (fail-fast) on one line.

[disk]
size = "4G"

[memory]
size = "4G"

# Layer N+1: warm postgres' shared buffer cache. Issues a series of
# SELECTs against pg_catalog so catalog + index pages are resident.
# Memory delta vs parent (compose just up): a few hundred MB of
# buffer pool, mostly catalog + index pages.
[prebuild.pg-prewarm]
kind = "live"
memory = "4G"
cmd = "docker compose exec -T db psql -U postgres -c 'SELECT count(*) FROM pg_class; SELECT count(*) FROM pg_attribute; SELECT count(*) FROM pg_proc; CHECKPOINT;' && echo prewarmed > /home/rlock/repo/.pg-prewarm"
key_files = ["docker-compose.yml"]

# Layer N+2: create application schema + seed 1 000 rows. Modest delta:
# new heap pages for created tables + WAL flush. ~10-50 MB of changed
# pages vs the prewarmed parent.
[prebuild.schema-loaded]
kind = "live"
memory = "4G"
cmd = "docker compose exec -T db psql -U postgres -c 'CREATE TABLE IF NOT EXISTS bench_items (id SERIAL PRIMARY KEY, payload TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT now()); INSERT INTO bench_items (payload) SELECT md5(g::text) FROM generate_series(1, 1000) g; CHECKPOINT;' && echo loaded > /home/rlock/repo/.schema-loaded"
key_files = ["docker-compose.yml"]
